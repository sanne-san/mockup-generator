<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mockup Generator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    /* Checkerboard pattern to show transparency in the preview */
    #preview-wrapper {
      background-color: #f0f0f0;
      background-image:
        linear-gradient(45deg, #ddd 25%, transparent 25%),
        linear-gradient(-45deg, #ddd 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #ddd 75%),
        linear-gradient(-45deg, transparent 75%, #ddd 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }

    #drop-overlay {
      cursor: pointer;
    }

    #drop-overlay.drag-over {
      background-color: rgba(59, 130, 246, 0.08);
      border-color: #3b82f6 !important;
    }
  </style>
</head>
<body class="min-h-screen bg-white font-sans">

  <!-- Header -->
  <header class="border-b border-gray-200 bg-white">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <h1 class="text-lg font-semibold text-gray-900">Mockup Generator</h1>
      <div class="flex items-center gap-2">
        <button
          id="reset-btn"
          style="display:none"
          class="px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200 transition-colors"
        >Restart</button>
        <button
          id="crop-btn"
          style="display:none"
          class="px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200 transition-colors"
        >Crop</button>
        <button
          id="copy-btn"
          disabled
          class="px-4 py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200 transition-colors disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-gray-100"
        >Copy</button>
        <button
          id="download-btn"
          disabled
          class="px-4 py-2 rounded-lg text-sm font-medium bg-gray-900 text-white hover:bg-gray-800 transition-colors disabled:opacity-30 disabled:cursor-not-allowed disabled:hover:bg-gray-900"
        >Download</button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-5xl mx-auto px-6 py-10">

    <!-- Preview area -->
    <div id="preview-wrapper" class="relative rounded-xl overflow-hidden">
      <!-- Canvas (scaled down for preview) -->
      <div id="canvas-container" class="relative w-full flex items-start justify-center">
        <canvas id="mockup-canvas" class="block w-full h-auto"></canvas>

        <!-- Drop overlay — sits on top of the canvas, sized to match the screenshot area -->
        <div
          id="drop-overlay"
          class="absolute border-2 border-dashed border-gray-300 bg-white rounded flex flex-col items-center justify-center gap-3 select-none transition-colors"
        >
          <input id="file-input" type="file" accept="image/*" class="hidden" />
          <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
          </svg>
          <div class="text-center px-4">
            <p class="text-sm font-medium text-gray-700">Drop or paste your screenshot here</p>
            <p class="text-xs text-gray-400 mt-1">or click to browse</p>
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- Crop modal -->
  <div id="crop-modal" style="display:none" class="fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-6">
    <div class="bg-white rounded-xl flex flex-col w-full max-w-5xl" style="max-height:90vh">
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 shrink-0">
        <h2 class="text-base font-semibold text-gray-900">Crop image</h2>
        <div class="flex items-center gap-2">
          <button id="crop-cancel-btn" class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 transition-colors">
            Cancel
          </button>
          <button id="crop-apply-btn" class="px-4 py-2 rounded-lg text-sm font-medium bg-gray-900 text-white hover:bg-gray-700 transition-colors">
            Apply crop
          </button>
        </div>
      </div>
      <div class="overflow-hidden bg-gray-900 rounded-b-xl" style="min-height:0;flex:1">
        <img id="crop-image" style="display:block;max-width:100%" />
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
